<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isotype Population Chart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: transparent; }
    .wrap { padding: 1.25rem 1rem 1.5rem; }
    .legend { display: flex; gap: 16px; margin-bottom: 1.25rem; flex-wrap: wrap; min-height: 22px; }
    .leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #666; opacity: 0; transition: opacity 0.5s; }
    .leg-item.vis { opacity: 1; }
    .leg-swatch { width: 24px; height: 4px; border-radius: 2px; }
    .leg-stroke { width: 24px; height: 4px; border-radius: 2px; border: 1.5px solid; background: transparent; }
    .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 340px; }
    .fig svg { width: 100%; display: block; }
    .caption-area { margin-top: 0.85rem; min-height: 36px; font-size: 13px; color: #666; line-height: 1.5; }
    .caption-area strong { color: #111; font-weight: 500; }
    .replay-btn { margin-top: 1rem; background: transparent; border: 0.5px solid #aaa; border-radius: 8px; padding: 5px 14px; font-size: 12px; cursor: pointer; color: #666; display: none; }
    .replay-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="legend">
    <div class="leg-item" id="leg-1"><div class="leg-swatch" style="background:#56B4E9"></div><span>Working age — 63%</span></div>
    <div class="leg-item" id="leg-2"><div class="leg-swatch" style="background:#0072B2"></div><span>Has chronic condition — 49%</span></div>
    <div class="leg-item" id="leg-3"><div class="leg-swatch" style="background:#E69F00"></div><span>Neurodivergent — 17%</span></div>
    <div class="leg-item" id="leg-4"><div class="leg-stroke" style="border-color:#D55E00"></div><span>Does not disclose — 38%</span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="caption-area" id="caption"></div>
  <!-- <button class="replay-btn" id="replay">replay</button> -->
</div>

<script>
const NEUTRAL_FILL = '#B4B2A9';
const NEUTRAL_OPACITY = 0.28;
const heads = [];
const bodies = [];

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  heads.length = 0;
  bodies.length = 0;
  const ns = 'http://www.w3.org/2000/svg';
  for (let i = 0; i < 100; i++) {
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 20 18');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');

    const head = document.createElementNS(ns, 'circle');
    head.setAttribute('cx', '10');
    head.setAttribute('cy', '4.5');
    head.setAttribute('r', '3.8');

    const body = document.createElementNS(ns, 'rect');
    body.setAttribute('x', '4');
    body.setAttribute('y', '10');
    body.setAttribute('width', '12');
    body.setAttribute('height', '7');
    body.setAttribute('rx', '2');

    [head, body].forEach(el => {
      el.style.fill = NEUTRAL_FILL;
      el.style.fillOpacity = NEUTRAL_OPACITY;
      el.style.stroke = 'transparent';
      el.style.strokeWidth = '1.2';
      el.style.transition = 'fill 0.35s ease, fill-opacity 0.35s ease, stroke 0.35s ease';
    });

    svg.appendChild(head);
    svg.appendChild(body);
    grid.appendChild(svg);
    heads.push(head);
    bodies.push(body);
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function setCaption(html) { document.getElementById('caption').innerHTML = html; }
function showLegend(id) { document.getElementById(id).classList.add('vis'); }

function applyFill(idx, fill, opacity) {
  heads[idx].style.fill = fill;
  heads[idx].style.fillOpacity = opacity || '0.88';
  bodies[idx].style.fill = fill;
  bodies[idx].style.fillOpacity = opacity || '0.88';
}

function applyStroke(idx, stroke) {
  heads[idx].style.stroke = stroke;
  bodies[idx].style.stroke = stroke;
}

async function animateFill(indices, fill, fillDelay, opacity) {
  for (let i = 0; i < indices.length; i++) {
    setTimeout(() => applyFill(indices[i], fill, opacity), i * fillDelay);
  }
  await delay(indices.length * fillDelay + 280);
}

async function animateStroke(indices, stroke, strokeDelay) {
  for (let i = 0; i < indices.length; i++) {
    setTimeout(() => applyStroke(indices[i], stroke), i * strokeDelay);
  }
  await delay(indices.length * strokeDelay + 300);
}

function resetAllImmediate() {
  heads.concat(bodies).forEach(el => {
    el.style.transition = 'none';
    el.style.fill = NEUTRAL_FILL;
    el.style.fillOpacity = NEUTRAL_OPACITY;
    el.style.stroke = 'transparent';
  });
}

function restoreTransitions() {
  heads.concat(bodies).forEach(el => {
    el.style.transition = 'fill 0.35s ease, fill-opacity 0.35s ease, stroke 0.35s ease';
  });
}

async function runAnimation() {
  document.getElementById('caption').innerHTML = '';
  resetAllImmediate();
  await delay(50);
  restoreTransitions();
  document.querySelectorAll('.leg-item').forEach(el => el.classList.remove('vis'));
  setCaption('');
  // document.getElementById('replay').style.display = 'none';
  // await delay(2000);
  
  

  const working    = Array.from({length: 63}, (_, i) => i);
  const chronic    = Array.from({length: 49}, (_, i) => i);
  const nd         = Array.from({length: 17}, (_, i) => i);
  const nodisclose = Array.from({length: 38}, (_, i) => i);

  showLegend('leg-1');
  await animateFill(working, '#56B4E9', 28);
  document.getElementById('caption').innerHTML += '<strong>63% of Americans</strong> are working age.<sup>1</sup><br>';
  await delay(1200);

  showLegend('leg-2');
  await animateFill(chronic, '#0072B2', 30);
  document.getElementById('caption').innerHTML += '<strong>78.4% of those workers</strong> have at least one chronic condition.<sup>2</sup><br>';
  await delay(1200);

  showLegend('leg-3');
  await animateFill(nd, '#E69F00', 38);
  document.getElementById('caption').innerHTML += '<strong>17% of workers</strong> are neurodivergent.<sup>3</sup><br>';
  await delay(1200);

  showLegend('leg-4');
  await animateStroke(nodisclose, '#D55E00', 22);
  document.getElementById('caption').innerHTML += '<strong>76% of them</strong> do not disclose their condition at work.<sup>4</sup><br>';
  await delay(500);

  // document.getElementById('replay').style.display = 'inline-block';
}


buildGrid();
setTimeout(() => {
  runAnimation().then(function repeat() {
    setTimeout(() => runAnimation().then(repeat), 2000);
  });
}, 400);
</script>
</body>
</html>
